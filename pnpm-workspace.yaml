# pnpm-workspace.yaml — pnpm settings. This is a single-package repo; the
# file exists for configuration, not workspace packages.

# Install-script allow-list (`allowBuilds`, the pnpm 11 replacement for the
# removed `onlyBuiltDependencies`). pnpm refuses to run post-install scripts
# for packages not approved here — they land in node_modules but skip their
# build step, which silently breaks runtime:
#   • better-sqlite3 — no compiled native binding
#   • esbuild        — no platform binary in @esbuild/<os>-<arch>
#   • sharp          — no libvips bundle
#   • tesseract.js   — no language data
#   • @swc/core      — no platform binary
#   • @parcel/watcher — no native fsevents
#   • unrs-resolver  — no native binding
#   • @tauri-apps/cli — no platform binary
# When pnpm prompts to approve a NEW dep, run `pnpm approve-builds`
# interactively (it writes back here) or add `'<name>': true` below.
# Values must be real booleans — quoted strings are parsed as "not
# approved" and the build is silently skipped.
allowBuilds:
  '@parcel/watcher': true
  '@swc/core': true
  '@tauri-apps/cli': true
  better-sqlite3: true
  core-js-pure: false
  esbuild: true
  sharp: true
  tesseract.js: true
  unrs-resolver: true

# Force-resolve `postcss` to a patched release. pnpm reads the `overrides`
# block from this file in preference to package.json's `pnpm.overrides` —
# keeping it in package.json AND here would cause
# `[ERR_PNPM_LOCKFILE_CONFIG_MISMATCH]` in CI when the two sources
# disagree on field-set. Patches GHSA-qx2v-qp2m-jg93 (XSS via
# unescaped end-style tag in CSS stringify, fixed in 8.5.10).
#
# `@babel/core` is forced to the patched 7.29.1 line. Next pins it
# transitively at 7.29.0 (next > styled-jsx > @babel/core), which
# `pnpm audit --prod` rejects for GHSA-4x5r-pxfx-6jf8 (arbitrary file
# read via a sourceMappingURL comment, fixed in 7.29.1).
#
# `sharp` is forced to the patched 0.35 line. Next (even 16.2.11) still
# pins it transitively at ^0.34.5 (next > sharp, used by the image
# optimizer), which `pnpm audit --prod` rejects for GHSA-f88m-g3jw-g9cj
# (libvips CVE-2026-33327/-33328/-35590/-35591, fixed in sharp 0.35.0).
# Drop this once Next's own range moves to >=0.35.
overrides:
  postcss: ^8.5.12
  '@babel/core': ^7.29.1
  sharp: ^0.35.0
