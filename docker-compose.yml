name: privacytracker

services:
  web:
    build: .
    # Bind to loopback only — the auditor is a single-user local-first tool.
    # Anyone who wants to expose it to their LAN can put a reverse proxy
    # (with TLS and auth) in front of 127.0.0.1:3000.
    ports:
      - "127.0.0.1:3000:3000"
    # SQLite lives in a Docker-managed named volume by default. The container
    # runs as the non-root `audit` user (uid 100 / gid 101); Docker initialises
    # a named volume with the image path's ownership, so the DB is writable on
    # every host with no manual setup. A host bind mount does NOT get this —
    # the engine auto-creates the bind source as root:root, which uid 100 can't
    # write to, so SQLite throws SQLITE_CANTOPEN on first start. If you'd rather
    # keep the DB on your host filesystem at ./data/privacy.db, use the
    # bind-mount override instead (see docker-compose.bind-mount.yml).
    volumes:
      - privacytracker-data:/app/data
    environment:
      - NODE_ENV=production
      # Set AUDITOR_ADMIN_TOKEN in an .env file (or here) to require an
      # x-auditor-admin-token header on destructive routes. Optional; leave
      # blank and same-origin CSRF + 127.0.0.1 binding are the defence.
      - AUDITOR_ADMIN_TOKEN=${AUDITOR_ADMIN_TOKEN:-}
    restart: unless-stopped
    # Drop all Linux capabilities then re-add nothing — Next.js doesn't need
    # CAP_NET_BIND_SERVICE since it binds to 3000 (>1024).
    cap_drop:
      - ALL
    # Prevent privilege escalation via setuid binaries.
    security_opt:
      - no-new-privileges:true
    # Read-only root filesystem with scoped tmpfs for the only writable
    # paths Next needs at runtime. SQLite writes go through the named
    # volume mounted above at /app/data.
    read_only: true
    tmpfs:
      - /tmp:size=128m,mode=1777
      - /app/.next/cache:size=128m,mode=0755
    # Resource ceiling — an unbounded process can be coerced into CPU spin
    # by malformed policy text. These caps turn DoS into a cheap recoverable
    # 500.
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
    # Minimal syscall / logging constraints.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

# Named volume for the SQLite DB. Back it up with:
#   docker compose cp web:/app/data ./data-backup
# or inspect its host path with `docker volume inspect privacytracker_privacytracker-data`.
volumes:
  privacytracker-data:
