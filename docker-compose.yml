version: '3.8'

services:
  web:
    build: .
    # Bind to loopback only — the auditor is a single-user local-first tool.
    # Anyone who wants to expose it to their LAN can put a reverse proxy
    # (with TLS and auth) in front of 127.0.0.1:3000.
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      # Set AUDITOR_ADMIN_TOKEN in an .env file (or here) to require an
      # x-auditor-admin-token header on destructive routes. Optional; leave
      # blank and same-origin CSRF + 127.0.0.1 binding are the defence.
      - AUDITOR_ADMIN_TOKEN=${AUDITOR_ADMIN_TOKEN:-}
    restart: unless-stopped
    # Drop all Linux capabilities then re-add nothing — Next.js doesn't need
    # CAP_NET_BIND_SERVICE since it binds to 3000 (>1024).
    cap_drop:
      - ALL
    # Prevent privilege escalation via setuid binaries.
    security_opt:
      - no-new-privileges:true
    # Read-only root filesystem with scoped tmpfs for the only writable
    # paths Next needs at runtime. SQLite writes go through the bind-mounted
    # volume above.
    read_only: true
    tmpfs:
      - /tmp:size=128m,mode=1777
      - /app/.next/cache:size=128m,mode=0755
    # Resource ceiling — an unbounded process can be coerced into CPU spin
    # by malformed policy text. These caps turn DoS into a cheap recoverable
    # 500.
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
    # Minimal syscall / logging constraints.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
