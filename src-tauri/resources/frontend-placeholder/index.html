<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>privacytracker — booting…</title>
    <style>
    html,
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      margin: 0;
      font-family:
        -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      color: #e8ecff;
      background: #0f1220;
    }
    .wrap {
      text-align: center;
    }
    .spinner {
      width: 28px;
      height: 28px;
      margin: 0 auto 14px;
      border: 3px solid rgba(255, 255, 255, 0.15);
      border-top-color: #7c89ff;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
    h1 {
      margin: 0;
      font-size: 15px;
      font-weight: 500;
      opacity: 0.85;
    }
    p {
      margin: 6px 0 0;
      font-size: 12px;
      opacity: 0.55;
    }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="spinner"></div>
      <h1>Starting privacytracker…</h1>
      <p>Waking up the background sync engine</p>
    </div>
  </body>
</html>
