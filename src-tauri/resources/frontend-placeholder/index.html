<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>privacytracker — booting…</title>
    <style>
      html, body {
        margin: 0;
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        background: #0f1220;
        color: #e8ecff;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .wrap { text-align: center; }
      .spinner {
        width: 28px; height: 28px;
        border-radius: 50%;
        border: 3px solid rgba(255,255,255,0.15);
        border-top-color: #7c89ff;
        margin: 0 auto 14px;
        animation: spin 0.9s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      h1 { font-weight: 500; font-size: 15px; margin: 0; opacity: 0.85; }
      p { margin: 6px 0 0; opacity: 0.55; font-size: 12px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="spinner"></div>
      <h1>Starting privacytracker…</h1>
      <p>Waking up the background sync engine</p>
    </div>
  </body>
</html>
