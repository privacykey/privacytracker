name: privacytracker-traefik

services:
  privacytracker:
    image: ${PRIVACYTRACKER_IMAGE:-ghcr.io/privacykey/privacytracker:latest}
    restart: unless-stopped
    expose:
      - "3000"
    volumes:
      - privacytracker-data:/app/data
    environment:
      NODE_ENV: production
      AUDITOR_ADMIN_TOKEN: ${AUDITOR_ADMIN_TOKEN:-}
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=128m,mode=1777
      - /app/.next/cache:size=128m,mode=0755
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - traefik.enable=true
      - traefik.http.routers.privacytracker.rule=Host(`${PRIVACYTRACKER_HOST:-privacytracker.localhost}`)
      - traefik.http.routers.privacytracker.entrypoints=web
      - traefik.http.services.privacytracker.loadbalancer.server.port=3000
      # Optional basic auth. Generate a htpasswd/bcrypt value and escape
      # every "$" as "$$" before putting it in this label.
      # - traefik.http.middlewares.privacytracker-auth.basicauth.users=auditor:$$2y$$...
      # - traefik.http.routers.privacytracker.middlewares=privacytracker-auth
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  traefik:
    image: traefik:v3
    restart: unless-stopped
    depends_on:
      privacytracker:
        condition: service_healthy
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --ping=true
      - --accesslog=true
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  privacytracker-data:
