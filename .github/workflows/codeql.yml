name: CodeQL

# Run CodeQL only against `main` + on a weekly schedule. PR triggers
# are intentionally OFF — we're on the free GitHub Actions tier and a
# 2-job matrix (JS/TS + Rust) on every PR push was eating the bulk of
# our Action minutes for marginal additional coverage. Trade-off:
# CodeQL findings now surface post-merge rather than pre-merge.
#
# - main: every merged push runs CodeQL so the latest tip is always
#   scanned and the weekly cron has a fresh baseline.
# - schedule: weekly (Sun 18:24 UTC). CodeQL's upstream rule database
#   updates regularly; a re-scan catches new findings even when the
#   code hasn't changed.
#
# To re-enable PR scanning later, add a `pull_request:` block with the
# `paths:` filter that was here previously (see git blame on this
# file). Or drop the filter for full coverage at higher cost.
on:
  push:
    branches:
      - main
  schedule:
    - cron: '24 18 * * 0'

# Cancel an in-flight CodeQL run when a newer commit lands on the same
# ref. With only `push: main` + cron there's less collision risk than
# the previous PR-heavy setup, but back-to-back merges still benefit.
concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze ${{ matrix.language }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build-mode: none
          # Rust must use build-mode: `none` (buildless / source-only
          # extraction). The CodeQL Rust extractor explicitly rejects
          # `manual` with: "Rust does not support the manual build mode.
          # Please try using one of the following build modes instead:
          # none." Buildless mode parses the Cargo workspace without
          # invoking `cargo`, which means we don't need the Tauri /
          # webkit2gtk system deps below either.
          - language: rust
            build-mode: none

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@5e316336eb4f107009e477d4bfbfff13d7250fae  # v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Setup pnpm
        if: matrix.language == 'javascript-typescript'
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093  # v6
        with:
          version: 11.1.2

      - name: Setup Node
        if: matrix.language == 'javascript-typescript'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install JavaScript dependencies
        if: matrix.language == 'javascript-typescript'
        run: pnpm install --frozen-lockfile

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@5e316336eb4f107009e477d4bfbfff13d7250fae  # v4
