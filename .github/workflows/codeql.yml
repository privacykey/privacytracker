name: CodeQL

# Run CodeQL against `main`, on a weekly schedule, and on PRs that touch
# dependency manifests. Broad PR scanning stays OFF — we're on the free
# GitHub Actions tier and a 2-job matrix (JS/TS + Rust) on *every* PR push
# was eating the bulk of our Action minutes for marginal coverage. The
# `pull_request` + `paths` filter below is the deliberate exception: it
# scans Renovate's single dependency-update PR (and any hand-made dep
# change) pre-merge, since a lockfile/manifest bump is exactly where a
# newly-pulled transitive vuln would land. Feature PRs that don't touch
# these paths still skip CodeQL and surface findings post-merge.
#
# - main: every merged push runs CodeQL so the latest tip is always
#   scanned and the weekly cron has a fresh baseline.
# - schedule: weekly (Sun 18:24 UTC). CodeQL's upstream rule database
#   updates regularly; a re-scan catches new findings even when the
#   code hasn't changed.
# - pull_request (paths-filtered): dependency-manifest changes only —
#   the paths mirror what Renovate edits across all four ecosystems.
#
# To scan ALL PRs (full pre-merge coverage at higher cost), drop the
# `paths:` filter below.
on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'src-tauri/Cargo.toml'
      - 'src-tauri/Cargo.lock'
      - 'Dockerfile'
      - 'docker-compose*.yml'
      - 'deploy/**/compose.yaml'
      - '.github/workflows/**'
  schedule:
    - cron: '24 18 * * 0'

# Cancel an in-flight CodeQL run when a newer commit lands on the same
# ref. With only `push: main` + cron there's less collision risk than
# the previous PR-heavy setup, but back-to-back merges still benefit.
concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze ${{ matrix.language }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build-mode: none
          # Rust must use build-mode: `none` (buildless / source-only
          # extraction). The CodeQL Rust extractor explicitly rejects
          # `manual` with: "Rust does not support the manual build mode.
          # Please try using one of the following build modes instead:
          # none." Buildless mode parses the Cargo workspace without
          # invoking `cargo`, which means we don't need the Tauri /
          # webkit2gtk system deps below either.
          - language: rust
            build-mode: none

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@5e316336eb4f107009e477d4bfbfff13d7250fae  # v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Setup pnpm
        if: matrix.language == 'javascript-typescript'
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271  # v6
        with:
          version: 11.1.2

      - name: Setup Node
        if: matrix.language == 'javascript-typescript'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install JavaScript dependencies
        if: matrix.language == 'javascript-typescript'
        run: pnpm install --frozen-lockfile

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@5e316336eb4f107009e477d4bfbfff13d7250fae  # v4
