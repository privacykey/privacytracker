name: Build & Push Docker image to GHCR

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write
  # Required for the OIDC handshake that signs SLSA build provenance.
  # Without it the build-push action falls back to buildx-local
  # provenance, which isn't cryptographically traceable to this
  # workflow's identity — cosign-verifying consumers can't tell a
  # legitimate image apart from one a compromised CI baked.
  id-token: write
  # actions/attest-build-provenance writes to the GitHub Attestations API.
  attestations: write

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093  # v6
        with:
          version: 11.1.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Typecheck
        run: pnpm typecheck

      - name: Check locale parity
        run: pnpm lint:i18n

      - name: Test iOS import helper
        run: pnpm test:ios-import-helper

      - name: Audit production dependency tree
        run: pnpm audit --prod

      - name: Validate Docker Compose files
        run: |
          docker compose -f docker-compose.yml config >/dev/null
          docker compose -f deploy/caddy/compose.yaml config >/dev/null
          docker compose -f deploy/traefik/compose.yaml config >/dev/null

      - name: Build
        run: pnpm build

      - name: Release smoke test
        run: pnpm smoke:release

  container-smoke:
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Build Docker image
        run: docker build -t privacytracker-smoke .

      - name: Run Docker container
        run: |
          docker run -d --rm \
            --name privacytracker-smoke \
            -p 127.0.0.1:3000:3000 \
            privacytracker-smoke

      - name: Wait for healthcheck
        run: |
          for attempt in {1..40}; do
            if curl -fsS http://127.0.0.1:3000/api/ready; then
              echo "Container is healthy"
              exit 0
            fi
            echo "Waiting for container health (${attempt}/40)…"
            docker logs --tail=50 privacytracker-smoke || true
            sleep 3
          done
          docker logs privacytracker-smoke || true
          exit 1

      - name: Stop Docker container
        if: always()
        run: docker stop privacytracker-smoke || true

      - name: Smoke Caddy reverse proxy
        env:
          PRIVACYTRACKER_IMAGE: privacytracker-smoke
          PRIVACYTRACKER_HOST: privacytracker.localhost
          AUDITOR_ADMIN_TOKEN: ci-smoke-token
        run: |
          docker compose -f deploy/caddy/compose.yaml up -d
          for attempt in {1..40}; do
            if curl -kfsS --resolve privacytracker.localhost:443:127.0.0.1 https://privacytracker.localhost/api/ready; then
              echo "Caddy proxy is healthy"
              exit 0
            fi
            echo "Waiting for Caddy proxy (${attempt}/40)…"
            docker compose -f deploy/caddy/compose.yaml logs --tail=80 || true
            sleep 3
          done
          docker compose -f deploy/caddy/compose.yaml logs || true
          exit 1

      - name: Stop Caddy reverse proxy
        if: always()
        run: docker compose -f deploy/caddy/compose.yaml down -v || true

      - name: Smoke Traefik reverse proxy
        env:
          PRIVACYTRACKER_IMAGE: privacytracker-smoke
          PRIVACYTRACKER_HOST: privacytracker.localhost
          AUDITOR_ADMIN_TOKEN: ci-smoke-token
        run: |
          docker compose -f deploy/traefik/compose.yaml up -d
          for attempt in {1..40}; do
            if curl -fsS -H "Host: privacytracker.localhost" http://127.0.0.1/api/ready; then
              echo "Traefik proxy is healthy"
              exit 0
            fi
            echo "Waiting for Traefik proxy (${attempt}/40)…"
            docker compose -f deploy/traefik/compose.yaml logs --tail=80 || true
            sleep 3
          done
          docker compose -f deploy/traefik/compose.yaml logs || true
          exit 1

      - name: Stop Traefik reverse proxy
        if: always()
        run: docker compose -f deploy/traefik/compose.yaml down -v || true

  build-and-push:
    name: Build Docker image (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: container-smoke
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64/v8
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf  # v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            # branch name (e.g. main)
            type=ref,event=branch
            # full git SHA
            type=sha,format=long
            # semver tags from v* pushes  (v1.2.3 → 1.2.3, 1.2, 1)
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # latest only on main
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image digest
        id: build-and-push
        timeout-minutes: 50
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7
        with:
          context: .
          # Build each architecture on matching hardware. Running the arm64
          # Node/pnpm/native-addon install path under QEMU has produced
          # illegal-instruction crashes and CI jobs that sat until cancelled.
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=docker-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=docker-${{ matrix.arch }}
          outputs: type=image,name=ghcr.io/${{ github.repository }},push-by-digest=true,name-canonical=true,push=true
          # Emit per-platform provenance + SBOM. The multi-arch manifest gets
          # an OIDC-signed SLSA attestation after the digest merge job.
          provenance: true
          sbom: true

      - name: Export image digest
        run: |
          set -euo pipefail
          mkdir -p /tmp/digests
          digest="${{ steps.build-and-push.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload image digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: digest-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  publish-manifest:
    runs-on: ubuntu-latest
    needs: build-and-push
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf  # v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            # branch name (e.g. main)
            type=ref,event=branch
            # full git SHA
            type=sha,format=long
            # semver tags from v* pushes  (v1.2.3 → 1.2.3, 1.2, 1)
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # latest only on main
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Download image digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: Create and push multi-arch manifest
        id: manifest
        working-directory: /tmp/digests
        run: |
          set -euo pipefail
          TAG_ARGS=()
          while IFS= read -r tag; do
            [ -n "$tag" ] && TAG_ARGS+=(--tag "$tag")
          done <<< "${{ steps.meta.outputs.tags }}"

          shopt -s nullglob
          digest_files=(*)
          if [ "${#digest_files[@]}" -eq 0 ]; then
            echo "No image digest artifacts were downloaded" >&2
            exit 1
          fi

          DIGEST_ARGS=()
          for digest_file in "${digest_files[@]}"; do
            DIGEST_ARGS+=("ghcr.io/${{ github.repository }}@sha256:${digest_file}")
          done

          docker buildx imagetools create "${TAG_ARGS[@]}" "${DIGEST_ARGS[@]}"

          image_ref="$(printf '%s\n' "${{ steps.meta.outputs.tags }}" | head -n 1)"
          # GHCR's read replicas occasionally lag a beat behind the
          # write path — `imagetools inspect` run within ~1s of the
          # create above can return a transient registry error
          # (exit 255), which under `set -euo pipefail` would otherwise
          # bring down the whole step even though the manifest is
          # already pushed and visible to consumers within a few
          # seconds. Retry up to 5 times with 4s sleeps before giving
          # up; total worst case ~20s, well under the job timeout.
          manifest_digest=""
          for attempt in 1 2 3 4 5; do
            if inspect_output="$(docker buildx imagetools inspect "$image_ref" 2>&1)"; then
              manifest_digest="$(printf '%s\n' "$inspect_output" | awk '/^Digest:/ { print $2; exit }')"
              if [ -n "$manifest_digest" ]; then
                break
              fi
              echo "Attempt ${attempt}: inspect succeeded but produced no Digest line, retrying..." >&2
            else
              echo "Attempt ${attempt}: inspect failed (registry propagation lag?), retrying..." >&2
              echo "${inspect_output}" >&2
            fi
            sleep 4
          done
          if [ -z "$manifest_digest" ]; then
            echo "Failed to resolve manifest digest for $image_ref after 5 attempts" >&2
            exit 1
          fi
          echo "image-ref=$image_ref" >> "$GITHUB_OUTPUT"
          echo "digest=$manifest_digest" >> "$GITHUB_OUTPUT"

      # OIDC-signed SLSA build provenance — downstream consumers can
      # verify with `cosign verify-attestation --type slsaprovenance …`
      # against this repo's GitHub OIDC identity. Catches "compromised
      # CI baked a malicious image at the same digest" scenarios that
      # buildx-local provenance (set above) can't, because the local
      # provenance has no signature tying it to GitHub.
      - name: Attest build provenance (SLSA)
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.manifest.outputs.digest }}
          push-to-registry: true

      - name: Verify Docker provenance and SBOM attestations
        run: |
          node scripts/verify-docker-attestations.mjs "${{ steps.manifest.outputs.image-ref }}"
