name: Build & Push Docker image to GHCR

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Typecheck
        run: pnpm typecheck

      - name: Check locale parity
        run: pnpm lint:i18n

      - name: Test iOS import helper
        run: pnpm test:ios-import-helper

      - name: Audit production dependency tree
        run: pnpm audit --prod

      - name: Validate Docker Compose files
        run: |
          docker compose -f docker-compose.yml config >/dev/null
          docker compose -f deploy/caddy/compose.yaml config >/dev/null
          docker compose -f deploy/traefik/compose.yaml config >/dev/null

      - name: Build
        run: pnpm build

      - name: Release smoke test
        run: pnpm smoke:release

  container-smoke:
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build -t privacytracker-smoke .

      - name: Run Docker container
        run: |
          docker run -d --rm \
            --name privacytracker-smoke \
            -p 127.0.0.1:3000:3000 \
            privacytracker-smoke

      - name: Wait for healthcheck
        run: |
          for attempt in {1..40}; do
            if curl -fsS http://127.0.0.1:3000/api/ready; then
              echo "Container is healthy"
              exit 0
            fi
            echo "Waiting for container health (${attempt}/40)…"
            docker logs --tail=50 privacytracker-smoke || true
            sleep 3
          done
          docker logs privacytracker-smoke || true
          exit 1

      - name: Stop Docker container
        if: always()
        run: docker stop privacytracker-smoke || true

      - name: Smoke Caddy reverse proxy
        env:
          PRIVACYTRACKER_IMAGE: privacytracker-smoke
          PRIVACYTRACKER_HOST: privacytracker.localhost
          AUDITOR_ADMIN_TOKEN: ci-smoke-token
        run: |
          docker compose -f deploy/caddy/compose.yaml up -d
          for attempt in {1..40}; do
            if curl -kfsS --resolve privacytracker.localhost:443:127.0.0.1 https://privacytracker.localhost/api/ready; then
              echo "Caddy proxy is healthy"
              exit 0
            fi
            echo "Waiting for Caddy proxy (${attempt}/40)…"
            docker compose -f deploy/caddy/compose.yaml logs --tail=80 || true
            sleep 3
          done
          docker compose -f deploy/caddy/compose.yaml logs || true
          exit 1

      - name: Stop Caddy reverse proxy
        if: always()
        run: docker compose -f deploy/caddy/compose.yaml down -v || true

      - name: Smoke Traefik reverse proxy
        env:
          PRIVACYTRACKER_IMAGE: privacytracker-smoke
          PRIVACYTRACKER_HOST: privacytracker.localhost
          AUDITOR_ADMIN_TOKEN: ci-smoke-token
        run: |
          docker compose -f deploy/traefik/compose.yaml up -d
          for attempt in {1..40}; do
            if curl -fsS -H "Host: privacytracker.localhost" http://127.0.0.1/api/ready; then
              echo "Traefik proxy is healthy"
              exit 0
            fi
            echo "Waiting for Traefik proxy (${attempt}/40)…"
            docker compose -f deploy/traefik/compose.yaml logs --tail=80 || true
            sleep 3
          done
          docker compose -f deploy/traefik/compose.yaml logs || true
          exit 1

      - name: Stop Traefik reverse proxy
        if: always()
        run: docker compose -f deploy/traefik/compose.yaml down -v || true

  build-and-push:
    runs-on: ubuntu-latest
    needs: container-smoke

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # QEMU provides user-space emulation so the amd64 GitHub runner can
      # execute arm64 instructions during `RUN pnpm install` /
      # `RUN pnpm build` inside the Dockerfile. Without this, buildx
      # would refuse to build for a foreign platform.
      - name: Set up QEMU (multi-arch emulation)
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            # branch name (e.g. main)
            type=ref,event=branch
            # full git SHA
            type=sha,format=long
            # semver tags from v* pushes  (v1.2.3 → 1.2.3, 1.2, 1)
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # latest only on main
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          # Multi-arch manifest: native x86_64 servers + Apple Silicon /
          # Raspberry Pi / Graviton. better-sqlite3 is rebuilt per-arch
          # inside the image (see Dockerfile's `apk add python3 make g++`).
          platforms: linux/amd64,linux/arm64/v8
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Emit provenance + SBOM so the manifest GitHub shows on the
          # package page lists both platforms cleanly.
          provenance: true
          sbom: true

      - name: Verify Docker provenance and SBOM attestations
        run: |
          IMAGE_REF="$(printf '%s\n' "${{ steps.meta.outputs.tags }}" | head -n 1)"
          node scripts/verify-docker-attestations.mjs "$IMAGE_REF"
