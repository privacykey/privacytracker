# Signed + notarized macOS desktop release.
#
# Triggered on push of a v*.*.* tag (the normal path) or manually via the
# Actions UI (handy for dry-runs and testing the pipeline without cutting a
# real release).
#
# The signing job lives in the `macos-signing` GitHub Environment. That
# environment is configured (via repo Settings → Environments) with:
#
#   • Required reviewer = @privacykey (the repo owner). Every run pauses
#     for your approval before secrets are decrypted. Even a collaborator
#     with write access can't sign without you green-lighting the run.
#
#   • Deployment branches and tags = "Selected branches and tags", limited
#     to `v*`. A push to any branch that isn't a signed tag can't read the
#     signing secrets.
#
#   • Secrets are scoped to the environment (not the repo). Pull requests
#     from forks can't see them — GitHub strips environment secrets for
#     untrusted PRs at the platform level.
#
# See https://privacytracker-docs.privacykey.org/develop/build-from-source for the one-time setup of certificates, the App
# Store Connect API key, and the Tauri updater key.

name: macOS desktop release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release as (e.g. v0.1.0). Created/used as a draft release.'
        required: true
        type: string
      dry_run:
        description: 'If true, build and sign but skip notarization + release upload.'
        required: false
        default: false
        type: boolean

env:
  # Node 24 LTS ("Krypton"), active-LTS channel through Apr 2028.
  # Must match the sidecar Node version packaged into src-tauri/binaries/
  # so better-sqlite3's native ABI lines up — see comments further down.
  NODE_VERSION: '24.15.0'

permissions:
  # Needed so tauri-action can upload artifacts to the draft release.
  contents: write

jobs:
  build-and-sign:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    # Environment-scoped secrets + required reviewer gate. Runs won't start
    # the signing step until you approve in the Actions UI.
    environment: macos-signing
    strategy:
      fail-fast: false
      matrix:
        include:
          # macos-15 is the current stable GitHub-hosted macOS image.
          # Apple Silicon is the native architecture — arm64 builds are
          # compiled on-host. macos-14 is mid-deprecation (fully unsupported
          # by Nov 2, 2026) and macos-13 (the last native-Intel image) was
          # retired on Dec 4, 2025, so Intel builds now have to cross-compile
          # from an arm64 host — see the "Install Rust toolchain" step + the
          # npm_config_* env on the x64 matrix leg.
          #
          # When you're ready to jump to the newest image, bump both `os:`
          # lines below to `macos-26` (GA since Feb 2026). The rest of the
          # pipeline is image-agnostic.
          - os: macos-15
            target: aarch64-apple-darwin
            node_arch: arm64
          - os: macos-15
            target: x86_64-apple-darwin
            node_arch: x64

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271  # v6
        with:
          version: 11.1.2

      - name: Install Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install Rust toolchain (${{ matrix.target }})
        # Pinned to a SHA, not the `stable` branch — a branch ref is a
        # particularly weak supply-chain link (anyone with push access
        # to dtolnay/rust-toolchain could redirect every consumer's
        # workflow in seconds). Dependabot's github-actions ecosystem
        # will open a PR when this should be rolled forward.
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable as of 2026-05
        with:
          # Installing the target triple is enough for `cargo build
          # --target x86_64-apple-darwin` to cross-compile from an arm64
          # runner. Apple ships the SDK for both slices in every recent
          # Xcode, so no extra SDK juggling is needed here.
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry + target
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-${{ matrix.target }}-${{ hashFiles('src-tauri/Cargo.toml') }}
          restore-keys: |
            cargo-${{ matrix.target }}-

      # Install JS deps. For the x64 matrix leg we're on an arm64 runner but
      # building an Intel app, so we set npm_config_* to coax node-gyp /
      # prebuild-install into fetching x64 prebuilts for native modules
      # (notably better-sqlite3). Without this, better-sqlite3 would pick
      # its host-arch prebuild and the resulting .app would crash on any
      # Intel Mac with a NODE_MODULE_VERSION / arch mismatch on first
      # `require('better-sqlite3')`. pnpm honours the same `npm_config_*`
      # env vars when invoking node-gyp / prebuild-install for transitive
      # native deps.
      - name: Install JS deps
        env:
          npm_config_target_arch: ${{ matrix.node_arch }}
          npm_config_target_platform: darwin
          npm_config_target_libc: unknown
        run: pnpm install --frozen-lockfile

      # Fetch the exact Node binary we ship as a sidecar. Must match the
      # NODE_MODULE_VERSION that `better-sqlite3` was installed against in
      # the step above — pinning NODE_VERSION at the top of this file
      # guarantees the match.
      #
      # GPG-verified against the Node.js release-team signing keys, THEN
      # hash-verified against the now-trusted SHASUMS256.txt before
      # extraction. The bundled binary lands inside the signed + notarised
      # app, so a compromise of the nodejs.org distribution host (or any
      # TLS-MITM the GitHub runner walks into) would otherwise propagate a
      # tampered Node into every privacytracker auto-update. Notarisation /
      # Gatekeeper only verify the cert chain — they don't know what bytes
      # Node was supposed to be. The detached SHASUMS256.txt.sig closes the
      # gap a bare hash check left open: an attacker who can swap the
      # tarball can equally swap SHASUMS256.txt, but cannot forge a Node
      # release-team signature over it.
      #
      # NODE_RELEASE_KEYS must be kept in sync with the "Release keys"
      # section of https://github.com/nodejs/node#release-keys — SHASUMS256
      # is signed by exactly one release member, so a stale list fails
      # closed (gpg verification error), it never silently passes.
      - name: Download + verify bundled Node ${{ env.NODE_VERSION }} (${{ matrix.node_arch }})
        env:
          NODE_RELEASE_KEYS: >-
            5BE8A3F6C8A5C01D106C0AD820B1A390B168D356
            DD792F5973C6DE52C432CBDAC77ABFA00DDBF2B7
            CC68F5A3106FF448322E48ED27F5E38D5B0A215F
            8FCCA13FEF1D0C2E91008E09770F7A9A5AE15600
            890C08DB8579162FEE0DF9DB8BEAB4DFCF555EF4
            C82FA3AE1CBEDC6BE46B9360C43CEC45C17AB93C
            108F52B48DB57BB0CC439B2997B01419BD92F80A
            A363A499291CBBC940DD62E41F10027AF002F8B0
        run: |
          set -euo pipefail
          TARBALL="node-v${NODE_VERSION}-darwin-${{ matrix.node_arch }}.tar.gz"
          curl -fsSLO "https://nodejs.org/dist/v${NODE_VERSION}/${TARBALL}"
          curl -fsSLO "https://nodejs.org/dist/v${NODE_VERSION}/SHASUMS256.txt"
          curl -fsSLO "https://nodejs.org/dist/v${NODE_VERSION}/SHASUMS256.txt.sig"

          # Import the Node release-team public keys into a throwaway
          # keyring, trying multiple keyservers per key for resilience.
          export GNUPGHOME="$(mktemp -d)"
          for key in $NODE_RELEASE_KEYS; do
            for server in hkps://keys.openpgp.org hkps://keyserver.ubuntu.com hkps://pgp.mit.edu; do
              if gpg --batch --keyserver "$server" --recv-keys "$key"; then
                break
              fi
            done
          done

          # Verify the detached signature over SHASUMS256.txt. `set -e`
          # fails the step if no trusted release key signed it.
          gpg --batch --verify SHASUMS256.txt.sig SHASUMS256.txt

          # Only now that SHASUMS256.txt is trusted, verify the tarball's
          # row. `shasum -c -` exits non-zero on mismatch.
          grep " ${TARBALL}\$" SHASUMS256.txt | shasum -a 256 -c -

          gpgconf --kill gpg-agent || true
          rm -rf "$GNUPGHOME"
          tar xzf "${TARBALL}" -C /tmp
          rm -f "${TARBALL}" SHASUMS256.txt SHASUMS256.txt.sig
          mkdir -p src-tauri/binaries
          cp "/tmp/node-v${NODE_VERSION}-darwin-${{ matrix.node_arch }}/bin/node" \
            "src-tauri/binaries/node-${{ matrix.target }}"
          chmod +x "src-tauri/binaries/node-${{ matrix.target }}"
          # An unsuffixed copy too, for any host-side build probes.
          cp "src-tauri/binaries/node-${{ matrix.target }}" src-tauri/binaries/node

      # Set up a dedicated signing keychain so the staging script
      # below can codesign Mach-O binaries inside standalone.tar
      # BEFORE the tarball gets sealed into the .app bundle.
      # tauri-action sets up its own (separate) keychain for signing
      # the outer .app, but it does so after `beforeBuildCommand`
      # fires — too late to help us sign the contents we need to ship
      # inside the tar. Two keychains on the search list co-exist
      # cleanly; the cleanup step at the bottom removes ours.
      - name: Set up staging signing keychain
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PASS="$(openssl rand -base64 24)"
          KEYCHAIN_PATH="${RUNNER_TEMP}/staging.keychain-db"
          CERT_PATH="${RUNNER_TEMP}/staging-cert.p12"
          # Stash the path + password for later step env (and cleanup).
          echo "STAGING_KEYCHAIN_PATH=${KEYCHAIN_PATH}" >> "$GITHUB_ENV"
          echo "::add-mask::${KEYCHAIN_PASS}"
          echo "STAGING_KEYCHAIN_PASS=${KEYCHAIN_PASS}" >> "$GITHUB_ENV"
          umask 077
          printf '%s' "${APPLE_CERTIFICATE}" | base64 --decode > "${CERT_PATH}"
          security create-keychain -p "${KEYCHAIN_PASS}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${KEYCHAIN_PASS}" "${KEYCHAIN_PATH}"
          security import "${CERT_PATH}" \
            -P "${APPLE_CERTIFICATE_PASSWORD}" \
            -A -t cert -f pkcs12 \
            -k "${KEYCHAIN_PATH}"
          # Append our keychain to the user search list so codesign
          # finds the cert without us having to pass --keychain everywhere.
          security list-keychain -d user -s "${KEYCHAIN_PATH}" $(security list-keychain -d user | tr -d '" ')
          # Permit codesign / productsign to access the private key
          # without the interactive password prompt that runs would
          # block on.
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "${KEYCHAIN_PASS}" "${KEYCHAIN_PATH}"
          rm -f "${CERT_PATH}"
          # Sanity-check: the identity must be visible to codesign
          # right now, otherwise the staging step below will fail
          # with the same "item could not be found in the keychain"
          # the previous attempt died on.
          security find-identity -v -p codesigning "${KEYCHAIN_PATH}"

      - name: Stage Next.js standalone bundle
        # TAURI_BUILD_TARGET tells scripts/stage-standalone.mjs which
        # Node binary to drop into the .node-helper.app bundle that
        # ships inside standalone.tar. This matters for the x86_64 leg
        # which runs on an arm64 runner — host arch != target arch, so
        # without an explicit target the staging script would package
        # the host's arm64 Node into the Intel .app and crash on
        # launch on Intel Macs.
        #
        # APPLE_SIGNING_IDENTITY is the trigger for the codesign pass
        # inside stage-standalone.mjs — without it the script prunes
        # but does not sign, leaving notarytool to reject every
        # surviving .node / .dylib inside standalone.tar.
        env:
          TAURI_BUILD_TARGET: ${{ matrix.target }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: pnpm build:standalone

      # Materialise the App Store Connect API key (.p8) to disk. The secret
      # stores the file *contents*; notarytool needs a file path. We write
      # it with mode 600 into $RUNNER_TEMP and delete it in the cleanup
      # step regardless of outcome. The runner VM is destroyed at job end
      # anyway, so this is belt-and-braces.
      - name: Write App Store Connect API key
        id: write-api-key
        run: |
          set -euo pipefail
          p8_path="${RUNNER_TEMP}/appstoreconnect.p8"
          umask 077
          printf '%s' "${APPLE_API_KEY}" > "${p8_path}"
          echo "p8_path=${p8_path}" >> "$GITHUB_OUTPUT"
        env:
          # The full .p8 file contents (multi-line PEM).
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}

      # The Tauri action handles:
      #   • Decoding APPLE_CERTIFICATE (base64 p12) into a temporary keychain
      #   • Running `tauri build --target ${{ matrix.target }}`
      #   • Invoking notarytool with the App Store Connect API key creds
      #   • Stapling the notarization ticket onto the .app and .dmg
      #   • Signing the .app.tar.gz updater payload with TAURI_SIGNING_*
      #   • Uploading the resulting artifacts to a draft release when a tag
      #     push fires this workflow (see `tagName` / `releaseName` below).
      - name: Build, sign, notarize, and upload
        id: tauri
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5  # v0
        env:
          # --- GitHub Release upload ---
          # tauri-action attaches the signed .dmg / .app.tar.gz to a
          # draft release after notarization. The auto-provided
          # GITHUB_TOKEN (scoped by the workflow's permissions: block
          # above — contents: write) is enough; no PAT needed. Without
          # this thread-through the action gets all the way through
          # build + sign + notarize and then fails the job with
          # `GITHUB_TOKEN is required`, leaving you with notarized
          # artefacts that the runner discards on cleanup. Run
          # #26036804294 hit exactly that wall.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # --- Apple Developer ID (signing) ---
          # APPLE_CERTIFICATE is the base64 of your Developer ID Application
          # p12 export. APPLE_SIGNING_IDENTITY is the human string that
          # appears in Keychain Access next to the cert, e.g.
          #   "Developer ID Application: Your Name (ABCD123456)"
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}

          # --- App Store Connect API key (notarization) ---
          # Preferred path for CI — revocable from App Store Connect with
          # one click and unaffected by Apple ID 2FA prompts. The legacy
          # APPLE_ID / APPLE_PASSWORD / APPLE_TEAM_ID vars are also honoured
          # by notarytool if you'd rather use an app-specific password.
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_PATH: ${{ steps.write-api-key.outputs.p8_path }}

          # --- Tauri updater signing (ed25519) ---
          # Generate with: npx @tauri-apps/cli signer generate -w <path>
          # Put the PRIVATE key contents in TAURI_SIGNING_PRIVATE_KEY; put
          # the public key (printed by the generator) in tauri.conf.json
          # under plugins.updater.pubkey.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

          # Skip notarization on dry-runs so you can shake out build issues
          # without burning notarytool quota. The Tauri bundler reads this
          # flag via its own env-var shim, not a CLI arg.
          TAURI_BUNDLE_SKIP_NOTARIZE: ${{ github.event.inputs.dry_run == 'true' && '1' || '0' }}

          # --- Cross-compile target awareness ---
          # tauri-action runs `tauri build --target ${{ matrix.target }}`
          # which invokes the beforeBuildCommand (pnpm build:standalone),
          # which calls scripts/stage-standalone.mjs. The staging script
          # picks the bundled Node binary based on TAURI_BUILD_TARGET
          # rather than the host arch — see the comment in that script.
          # This export keeps the explicit-stage step (above) and the
          # tauri-action's implicit re-run consistent.
          TAURI_BUILD_TARGET: ${{ matrix.target }}

          # --- Skip the redundant beforeBuildCommand re-stage ---
          # stage-standalone has already run once above (in the
          # explicit "Stage Next.js standalone bundle" step) with our
          # staging keychain on the search list, which is where the
          # codesign pass on every .node / .dylib inside standalone.tar
          # actually succeeds. tauri-action's keychain isn't visible to
          # codesign at the moment beforeBuildCommand fires inside
          # `tauri build`, so without this guard the second run would
          # wipe the pre-signed tarball and die on the codesign call.
          # See the matching `STANDALONE_PRE_BUILT === '1'` early-exit
          # in scripts/stage-standalone.mjs.
          STANDALONE_PRE_BUILT: '1'
        with:
          # `pnpm tauri` without the trailing `--`. pnpm 11.0.x silently
          # stripped a trailing `--` separator before running the script;
          # 11.1.x passes it through, so the CLI saw a literal `--` as
          # its first positional arg and Clap rejected `build` as
          # "unexpected argument" (see commit message). Either form is
          # equivalent for arg forwarding — pnpm already passes the
          # action's `build --target …` straight through to the script.
          tauriScript: pnpm tauri
          args: --target ${{ matrix.target }}
          # Draft release keyed on the git tag. On tag push, GITHUB_REF_NAME
          # is the tag (e.g. v0.1.0). On workflow_dispatch, use the input.
          tagName: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
          releaseName: "privacytracker ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}"
          releaseDraft: true
          prerelease: false
          # Don't upload a per-leg latest.json — each matrix leg would
          # otherwise overwrite the previous one with a single-platform
          # manifest, so whichever arch finishes second wins and the
          # other platform's signature is dropped. The `assemble-latest-json`
          # job below merges both legs' .sig payloads into one manifest
          # that lists every platform we ship.
          includeUpdaterJson: false

      # Stage the per-arch updater signature so the assemble job can
      # build a multi-platform latest.json without re-running tauri.
      # The hard part is getting a fresh .sig file that matches the
      # .app.tar.gz on the draft release:
      #
      #   1. tauri-action with `includeUpdaterJson: false` skips
      #      uploading the .sig sidecar to the GitHub release
      #      (`gh release view v0.1.0` lists only .dmg + .app.tar.gz).
      #   2. The on-disk .sig in `src-tauri/.../bundle/macos/` is
      #      stale: tauri-action repacks `privacytracker.app.tar.gz`
      #      AFTER the bundler's initial sign, so the saved .sig is
      #      against the pre-repack tarball.
      #   3. This pinned action SHA doesn't populate a `signature`
      #      output we can read directly — `steps.tauri.outputs.signature`
      #      came through empty.
      #
      # Re-sign the .app.tar.gz attached to the release with the same
      # key tauri-action used. ed25519 is deterministic, so the
      # resulting .sig is the canonical signature for those bytes —
      # exactly what the auto-updater verifies on the client.
      - name: Stage updater payload for assemble job
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          STAGE="updater-stage/${{ matrix.target }}"
          mkdir -p "$STAGE"

          # Pull the .app.tar.gz asset back from the draft release.
          # tauri-action renames the local file before upload (e.g.
          # privacytracker.app.tar.gz -> privacytracker_x64.app.tar.gz),
          # so the release asset is the single source of truth for
          # the filename here.
          case "${{ matrix.target }}" in
            aarch64-apple-darwin) ASSET_GLOB='privacytracker_aarch64.app.tar.gz' ;;
            x86_64-apple-darwin)  ASSET_GLOB='privacytracker_x64.app.tar.gz'    ;;
            *) echo "::error::unknown target ${{ matrix.target }}" ; exit 1 ;;
          esac
          gh release download "${RELEASE_TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern "${ASSET_GLOB}" \
            --dir "$STAGE"

          tarball="$(ls -1 "$STAGE"/*.app.tar.gz | head -n1)"

          # `tauri signer sign` reads TAURI_SIGNING_PRIVATE_KEY +
          # TAURI_SIGNING_PRIVATE_KEY_PASSWORD straight from env
          # (per `tauri signer sign --help` — env fallbacks are
          # documented on -k / -p). Writes the signature to
          # <input>.sig next to the tarball.
          pnpm tauri signer sign "${tarball}"

          ls -la "$STAGE"

      - name: Upload updater payload artefact
        if: success()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: updater-${{ matrix.target }}
          path: updater-stage/${{ matrix.target }}/
          if-no-files-found: error
          retention-days: 7

      # Always runs — even if the signing step failed — so private key
      # material doesn't survive one second longer than it has to. The
      # runner VM is destroyed after the job completes anyway, but this
      # protects against a mid-run `actions/upload-artifact` accidentally
      # grabbing the file if a future edit adds one.
      - name: Clean up signing material
        if: always()
        run: |
          rm -f "${{ steps.write-api-key.outputs.p8_path }}" 2>/dev/null || true
          security delete-keychain build.keychain 2>/dev/null || true
          # Our staging keychain (set up early in the job to let
          # stage-standalone.mjs codesign Mach-O binaries inside
          # standalone.tar before tar). Best-effort delete; the runner
          # VM is destroyed at job-end anyway.
          if [ -n "${STAGING_KEYCHAIN_PATH:-}" ] && [ -f "${STAGING_KEYCHAIN_PATH}" ]; then
            security delete-keychain "${STAGING_KEYCHAIN_PATH}" 2>/dev/null || true
            rm -f "${STAGING_KEYCHAIN_PATH}" 2>/dev/null || true
          fi

  # ─────────────────────────────────────────────────────────────────────
  # Assemble a single multi-platform latest.json from the per-arch
  # signatures the build matrix produced, and attach it to the draft
  # release. This is what `tauri-plugin-updater` polls — its endpoint in
  # src-tauri/tauri.conf.json points at:
  #
  #   https://github.com/<owner>/<repo>/releases/latest/download/latest.json
  #
  # which redirects to whichever release is currently published. Until you
  # promote the draft, the updater sees the *previous* release's manifest
  # and stays put — so this job is safe to run before you've decided to
  # ship.
  #
  # Manifest shape (Tauri v2 spec):
  #
  #   {
  #     "version":   "0.1.0",
  #     "notes":     "<release body, plain text>",
  #     "pub_date":  "2026-04-26T10:00:00Z",
  #     "platforms": {
  #       "darwin-aarch64": { "signature": "<base64 .sig>", "url": "<.app.tar.gz URL>" },
  #       "darwin-x86_64":  { "signature": "<base64 .sig>", "url": "<.app.tar.gz URL>" }
  #     }
  #   }
  #
  # Tauri compares `version` against the running build's package.json
  # version using semver semantics (so 0.1.0-beta.1 < 0.1.0 — see
  # lib/update-check.ts compareVersions for the matching client-side rule).
  # ─────────────────────────────────────────────────────────────────────
  assemble-latest-json:
    name: Assemble + publish latest.json
    needs: build-and-sign
    runs-on: macos-26
    # Skip on dry-runs — the .sig files won't have hit the draft release
    # yet, and there's no point computing a manifest you're not going to
    # publish.
    if: ${{ !(github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true') }}

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Resolve release context
        id: ctx
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG='${{ github.event.inputs.tag }}'
          else
            TAG='${{ github.ref_name }}'
          fi
          # Strip the leading 'v' for the manifest version field. Tauri
          # compares semver values, not tag strings.
          VERSION="${TAG#v}"
          # Pull the release body for the `notes` field. The release was
          # created (as a draft) by tauri-action in the build job.
          gh release view "$TAG" --repo "${GITHUB_REPOSITORY}" --json body --jq '.body' > release_notes.txt || echo '' > release_notes.txt
          echo "tag=$TAG"                                       >> "$GITHUB_OUTPUT"
          echo "version=$VERSION"                               >> "$GITHUB_OUTPUT"
          echo "pub_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)"        >> "$GITHUB_OUTPUT"

      - name: Download per-arch updater artefacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          path: updater
          pattern: updater-*
          merge-multiple: false

      - name: Generate latest.json
        id: manifest
        env:
          TAG:      ${{ steps.ctx.outputs.tag }}
          VERSION:  ${{ steps.ctx.outputs.version }}
          PUB_DATE: ${{ steps.ctx.outputs.pub_date }}
          REPO:     ${{ github.repository }}
        run: |
          set -euo pipefail
          # Map cargo target triples → Tauri platform keys.
          #
          # A `case` statement instead of `declare -A` because GitHub's
          # macOS runners ship `/bin/bash` 3.2 (the GPLv3-pinned Apple
          # build) as the default shell for `run:` steps. bash 3.2
          # silently no-ops `declare -A`, after which
          # `[aarch64-apple-darwin]=…` parses as a subscript expansion
          # against an unbound `aarch64` variable and `set -u` aborts
          # with "aarch64: unbound variable" — exactly what bit the
          # v0.1.0 attempt (run #26040267397).
          NOTES=$(cat release_notes.txt)
          PLATFORMS='{}'

          for ARCH_DIR in updater/updater-*/; do
            TRIPLE=$(basename "$ARCH_DIR" | sed 's/^updater-//')
            case "$TRIPLE" in
              aarch64-apple-darwin) KEY=darwin-aarch64 ;;
              x86_64-apple-darwin)  KEY=darwin-x86_64  ;;
              *)
                echo "::warning::Unknown target triple $TRIPLE — skipping"
                continue
                ;;
            esac

            SIG_FILE=$(ls "$ARCH_DIR"*.app.tar.gz.sig 2>/dev/null | head -n1 || true)
            BIN_FILE=$(ls "$ARCH_DIR"*.app.tar.gz     2>/dev/null | head -n1 || true)
            if [ -z "$SIG_FILE" ] || [ -z "$BIN_FILE" ]; then
              echo "::warning::$KEY — missing .sig or .app.tar.gz; dropping from manifest"
              continue
            fi

            BIN_NAME=$(basename "$BIN_FILE")
            URL="https://github.com/${REPO}/releases/download/${TAG}/${BIN_NAME}"
            SIG=$(cat "$SIG_FILE")

            PLATFORMS=$(jq -n \
              --argjson p "$PLATFORMS" \
              --arg key "$KEY" \
              --arg sig "$SIG" \
              --arg url "$URL" \
              '$p + {($key): {signature: $sig, url: $url}}')
          done

          # Sanity check — refuse to publish a manifest with no platforms.
          # Better to fail the workflow loudly than ship an updater
          # endpoint that says "no update available" forever.
          PCOUNT=$(echo "$PLATFORMS" | jq 'length')
          if [ "$PCOUNT" -lt 1 ]; then
            echo "::error::latest.json would have zero platforms — failing"
            exit 1
          fi

          jq -n \
            --arg version "$VERSION" \
            --arg notes "$NOTES" \
            --arg pub_date "$PUB_DATE" \
            --argjson platforms "$PLATFORMS" \
            '{version: $version, notes: $notes, pub_date: $pub_date, platforms: $platforms}' \
            > latest.json

          echo '----- latest.json -----'
          cat latest.json
          echo '-----------------------'

      - name: Upload latest.json to draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG:      ${{ steps.ctx.outputs.tag }}
        run: |
          set -euo pipefail
          gh release upload "$TAG" latest.json --clobber --repo "${GITHUB_REPOSITORY}"

      # Mirrors the per-arch upload — keeps the assembled manifest visible
      # on the workflow run page even if a future revert pulls it off the
      # release. Useful when debugging "why does the updater think we're
      # already on latest" reports.
      - name: Upload latest.json as workflow artefact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: latest-json
          path: latest.json
          if-no-files-found: error
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────
  # Bump the privacykey/homebrew-tap cask to point at the just-uploaded
  # release. Opens a PR against the tap rather than committing straight
  # to main so a human still reviews the URL + sha256 change before
  # consumers' `brew upgrade` picks it up.
  #
  # Gated on `assemble-latest-json` because we need both matrix legs'
  # DMG assets to be on the release before computing fresh sha256s
  # against them. Skipped on dry-runs for the same reason that job is.
  #
  # Requires a fine-grained PAT in the HOMEBREW_TAP_TOKEN repo secret
  # with `Contents: read & write` + `Pull requests: read & write` on
  # privacykey/homebrew-tap. The default GITHUB_TOKEN can only write
  # back to THIS repo, so the cross-repo PR needs a separate token.
  # ─────────────────────────────────────────────────────────────────────
  bump-homebrew-cask:
    name: Bump Homebrew cask
    needs: assemble-latest-json
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ !(github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true') }}

    steps:
      - name: Verify HOMEBREW_TAP_TOKEN is set
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "${TAP_TOKEN}" ]; then
            cat >&2 <<'EOF'
          ::error::HOMEBREW_TAP_TOKEN secret is not configured on this repo.
          Create a fine-grained PAT with 'Contents: read & write' and
          'Pull requests: read & write' on privacykey/homebrew-tap, then
          add it as the HOMEBREW_TAP_TOKEN repo secret here. The release
          itself has already succeeded — configure the token and re-run
          this job (Actions → failed run → "Re-run failed jobs").
          EOF
            exit 1
          fi

      - name: Resolve release context
        id: ctx
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG='${{ github.event.inputs.tag }}'
          else
            TAG='${{ github.ref_name }}'
          fi
          # Strip the leading 'v' for the cask `version` field. Homebrew
          # versions don't carry a v-prefix; the URL template adds it back.
          VERSION="${TAG#v}"
          echo "tag=$TAG"             >> "$GITHUB_OUTPUT"
          echo "version=$VERSION"     >> "$GITHUB_OUTPUT"

      - name: Download release DMGs + compute sha256
        id: hashes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.ctx.outputs.tag }}
          VERSION: ${{ steps.ctx.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p dmgs
          gh release download "${TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern "privacytracker_${VERSION}_aarch64.dmg" \
            --pattern "privacytracker_${VERSION}_x64.dmg" \
            --dir dmgs
          SHA_ARM=$(shasum -a 256 "dmgs/privacytracker_${VERSION}_aarch64.dmg" | awk '{print $1}')
          SHA_X64=$(shasum -a 256 "dmgs/privacytracker_${VERSION}_x64.dmg"     | awk '{print $1}')
          if [ -z "$SHA_ARM" ] || [ -z "$SHA_X64" ]; then
            echo "::error::Failed to hash one or both DMGs for $TAG"
            exit 1
          fi
          echo "sha_arm=$SHA_ARM" >> "$GITHUB_OUTPUT"
          echo "sha_x64=$SHA_X64" >> "$GITHUB_OUTPUT"

      - name: Checkout privacykey/homebrew-tap
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: privacykey/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Regenerate Casks/privacytracker.rb
        env:
          VERSION: ${{ steps.ctx.outputs.version }}
          SHA_ARM: ${{ steps.hashes.outputs.sha_arm }}
          SHA_X64: ${{ steps.hashes.outputs.sha_x64 }}
        run: |
          mkdir -p tap/Casks
          cat > tap/Casks/privacytracker.rb <<EOF
          # AUTO-GENERATED by privacykey/privacytracker macos-release workflow.
          # Manual edits will be overwritten on the next release.
          cask "privacytracker" do
            arch arm: "aarch64", intel: "x64"

            version "${VERSION}"
            sha256 arm:   "${SHA_ARM}",
                   intel: "${SHA_X64}"

            url "https://github.com/privacykey/privacytracker/releases/download/v#{version}/privacytracker_#{version}_#{arch}.dmg",
                verified: "github.com/privacykey/privacytracker/"
            name "privacytracker"
            desc "Monitor, track, and get alerted when iOS apps change their privacy labels"
            homepage "https://github.com/privacykey/privacytracker"

            livecheck do
              url :url
              strategy :github_latest
            end

            auto_updates true
            depends_on macos: :big_sur

            app "privacytracker.app"

            zap trash: [
              "~/Library/Application Support/privacytracker",
              "~/Library/Caches/org.privacykey.privacytracker",
              "~/Library/HTTPStorages/org.privacykey.privacytracker",
              "~/Library/HTTPStorages/org.privacykey.privacytracker.binarycookies",
              "~/Library/Preferences/org.privacykey.privacytracker.plist",
              "~/Library/Saved Application State/org.privacykey.privacytracker.savedState",
              "~/Library/WebKit/org.privacykey.privacytracker",
            ]
          end
          EOF

      - name: Commit + open PR on the tap
        working-directory: tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ steps.ctx.outputs.version }}
          TAG: ${{ steps.ctx.outputs.tag }}
        run: |
          set -euo pipefail
          BRANCH="bump-privacytracker-${VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # If a previous attempt at this version already pushed the
          # branch (e.g. workflow re-run after a transient failure),
          # reuse it instead of erroring on "ref already exists".
          if git ls-remote --exit-code --heads origin "${BRANCH}" >/dev/null 2>&1; then
            git fetch origin "${BRANCH}":"${BRANCH}"
            git checkout "${BRANCH}"
          else
            git checkout -b "${BRANCH}"
          fi
          git add Casks/privacytracker.rb
          if git diff --cached --quiet; then
            echo "Cask already at ${VERSION} — nothing to do."
            exit 0
          fi
          git commit -m "privacytracker ${VERSION}"
          git push -u origin "${BRANCH}"
          # `gh pr create` is idempotent-ish: it errors if a PR already
          # exists for the same head branch. Detect that and skip
          # rather than failing the job.
          if gh pr view "${BRANCH}" --repo privacykey/homebrew-tap >/dev/null 2>&1; then
            echo "PR for ${BRANCH} already open — branch pushed, leaving it for review."
            exit 0
          fi
          gh pr create \
            --repo privacykey/homebrew-tap \
            --title "privacytracker ${VERSION}" \
            --body "Auto-generated by https://github.com/privacykey/privacytracker macos-release workflow for tag \`${TAG}\`." \
            --base main \
            --head "${BRANCH}"
