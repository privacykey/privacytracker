version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Australia/Melbourne
    groups:
      next-react:
        patterns:
          - next
          - react
          - react-dom
      biome-lint:
        patterns:
          - "@biomejs/*"
          - ultracite
      test-tooling:
        patterns:
          - "@playwright/*"
          - tsx
          - typescript
          - "@types/*"

  - package-ecosystem: cargo
    directory: /src-tauri
    schedule:
      interval: weekly
      day: monday
      time: "09:30"
      timezone: Australia/Melbourne
    groups:
      tauri:
        patterns:
          - tauri
          - tauri-*
      rust-support:
        patterns:
          - serde*
          - ureq
          - dirs
          - log
          - tar

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "10:00"
      timezone: Australia/Melbourne

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "10:30"
      timezone: Australia/Melbourne
